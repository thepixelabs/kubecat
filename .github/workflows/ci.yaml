name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    # Note: We explicitly exclude 'closed' to prevent CI from running when a PR is merged.
    # The Release workflow handles builds on main.

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linting (runs in parallel with frontend-build)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Create Frontend Dist Stub
        run: mkdir -p frontend/dist && echo "" > frontend/dist/index.html

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run --timeout=10m

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . --max-warnings=0

  # Frontend tests and build (Must run first for embed assets)
  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm run test:coverage

      - name: Audit Frontend Dependencies
        run: |
          cd frontend
          npm audit --audit-level=high --omit=dev

      - name: Build Frontend Assets
        run: |
          cd frontend
          npm run build

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

      # Save dist for backend tests
      - name: Cache Frontend Build
        uses: actions/cache@v5
        with:
          path: frontend/dist
          key: ${{ runner.os }}-frontend-dist-${{ github.sha }}

  # Backend tests (Requires frontend/dist)
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      # Restore the built assets so embed works
      - name: Restore Frontend Build
        uses: actions/cache@v5
        with:
          path: frontend/dist
          key: ${{ runner.os }}-frontend-dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Go Tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Upload Go Coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: coverage.out
          retention-days: 7

  # Full build (depends on tests and lint passing)
  build:
    name: Build Application
    runs-on: macos-14
    needs: [backend-tests, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v5
        with:
          path: |
            ~/go/bin/wails
          key: ${{ runner.os }}-wails-v2.11.0

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Add Go Bin to Path
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Application
        run: wails build -s

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: kubecat-macos
          path: build/bin/
          retention-days: 7

  # Preview semantic release version
  version-preview:
    name: Version Preview
    runs-on: ubuntu-latest
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preview Next Version
        # Pin to v1.24.1 — resolve the commit SHA with: gh api repos/go-semantic-release/action/git/ref/tags/v1.24.1
        uses: go-semantic-release/action@v1.24.1
        with:
          dry: true
          changelog-generator-opt: "emojis=true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF: refs/heads/main
          GITHUB_EVENT_NAME: push
